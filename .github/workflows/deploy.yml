name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build deployment zip
        # Excludes: git internals, CI config, tests, docs, outputs,
        # Python bytecode, model artifacts (downloaded at startup from blob),
        # and raw data (not needed at runtime — baked into the .pkl).
        run: |
          zip -r dist.zip . \
            --exclude "*.git/*" \
            --exclude ".github/*" \
            --exclude "tests/*" \
            --exclude "docs/*" \
            --exclude "outputs/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*.pyo" \
            --exclude "*.pkl" \
            --exclude "data/*" \
            --exclude ".venv/*" \
            --exclude "dist.zip"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --src-path dist.zip \
            --type zip \
            --async false
